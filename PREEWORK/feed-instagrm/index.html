<!DOCTYPE html>
<html lang="es">

<head>
    <link rel="stylesheet" type="text/css" href="style.css" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
</head>

<body>
    <header class="feed_de_instagram">
        <div class="tittle">
            <h1>Breathe Code Photo Feed</h1>
        </div>
    </header>
    <div class="container">
        <div class="post">
            <header class="Post_titulo">
                <div class="titulo">
                    <h2>Programando</h2>
                </div>
                <div class="Page">
                    <p>1/3</p>
                </div>
            </header>
            <div class="image">
                <img src="https://www.springboard.com/blog/wp-content/uploads/2023/09/what-exactly-does-a-programmer-do-700x467.jpeg"
                    alt="Programmers" width="400px">
            </div>
            <div class="comment">
                <p>Soy un programador Junior</p>
            </div>
        </div>
        <div class="post">
            <header class="Post_titulo">
                <div class="titulo">
                    <h2>Programando desde el trabajo</h2>
                </div>
                <div class="Page">
                    <p>2/3</p>
                </div>
            </header>
            <div>
                <div class="image">
                    <img src="https://www.onlinedegree.com/wp-content/uploads/2016/11/computer_programmer.jpg"
                        alt="Programers2" width="400px">
                </div>
                <div class="comment">
                    <p>Vengo al trabajo dos veces por semana</p>
                </div>
            </div>
        </div>
        <div class="post">
            <div class="Post_titulo">
                <div class="titulo">
                    <h2>Me gusta realizar proyectos</h2>
                </div>
                <div class="Page">
                    <p>3/3</p>
                </div>
            </div>
            <div class="image">
                <img src="https://fsa2-assets.imgix.net/assets/iStock-1402826904.jpg?auto=compress%2Cformat&crop=focalpoint&domain=fsa2-assets.imgix.net&fit=crop&fp-x=0.5&fp-y=0.5&h=800&ixlib=php-3.3.1&w=1200"
                    alt="Programmers3" width="400px">
            </div>
            <div class="comment">
                <p>Me gusta realizar proyectos grupales</p>
            </div>
        </div>
    </div>
    </div>
</body>

</html>
